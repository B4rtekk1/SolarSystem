name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Windows executable and create release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable

      - name: Build release executable
        run: cargo build --release --locked

      - name: Prepare release asset
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $safeTag = $env:TAG_NAME -replace '[^A-Za-z0-9._-]', '-'
          $assetName = "SolarSystem-$safeTag-windows-x86_64.exe"
          Copy-Item "target/release/SolarSystem.exe" $assetName
          "ASSET_NAME=$assetName" >> $env:GITHUB_ENV

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$env:TAG_NAME" --repo "$env:GITHUB_REPOSITORY" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:TAG_NAME" `
              --repo "$env:GITHUB_REPOSITORY" `
              --title "Solar System $env:TAG_NAME" `
              --generate-notes
          }

      - name: Upload Windows executable
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release upload "$env:TAG_NAME" "$env:ASSET_NAME" `
            --repo "$env:GITHUB_REPOSITORY" `
            --clobber
